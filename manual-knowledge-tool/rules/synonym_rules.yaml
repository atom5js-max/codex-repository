# synonym_rules.yaml
# 현장어 → 매뉴얼어 확장 규칙
#
# 구조:
#   rule_name:
#     field_terms   : 현장에서 쓰는 표현 목록 (이 중 하나라도 쿼리에 포함되면 규칙 발동)
#     manual_terms  : 매뉴얼에서 쓰는 용어 목록 (확장 검색에 사용)
#     check_items   : 현장 확인 항목 (결과 하단에 표시, 단정 지시 아님)
#
# 우선순위: field_terms 중 긴 문자열 먼저 매칭

speed_command_problem:
  field_terms:
    - 속도 안 먹음
    - 속도지령 안 먹음
    - 주파수 지령 안 됨
    - 주파수지령 안 됨
    - 인버터 속도 안 바뀜
    - 속도 안 바뀜
    - 주파수 안 바뀜
    - 지령 안 먹음
  manual_terms:
    - Frequency Reference
    - Command Source
    - Speed Command
    - Run Command
    - Communication Command
    - Modbus
    - RS-485
    - 주파수지령
    - 운전지령
    - 지령소스
    - 다단속
    - Multi-Step Speed
  check_items:
    - 운전지령 소스(디지털/아날로그/통신) 설정 확인
    - 주파수지령 소스 파라미터 확인
    - 통신 국번 확인
    - 통신속도(Baudrate) 확인
    - 패리티(Parity) 확인
    - PLC Write 레지스터 주소 확인
    - 인버터 RUN 상태 확인

